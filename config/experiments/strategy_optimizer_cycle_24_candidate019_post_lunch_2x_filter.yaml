# Candidate overlay only. Production YAML remains unchanged.
# Cycle-24 bounded hypothesis from fresh batch_search_20260517_080348:
# rank-1 candidate_019 was sample-eligible but still negative. Its long_1x
# sleeve was 26 losses out of 26, and the remaining post-lunch 2x exits around
# 13:00 were a small fully losing cluster. Keep the rank-1 candidate settings,
# retain the long_1x block, and add one narrow 13:00-13:29 2x entry block.
strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "cycle_24_block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "cycle_24_block_post_lunch_2x_entries"
      enabled: true
      actions: ["long_2x", "short_2x"]
      start_time: "13:00"
      end_time: "13:29"
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.2
      short_2x: 0.5
    dynamic_holding:
      confidence_extend_multiplier: 1.2
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true
model:
  prediction:
    min_confidence: 0.3
    min_action_probability: 0.3
backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.0
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.2
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_24_candidate019_post_lunch_2x_filter"
