# Candidate overlay only. Production YAML remains unchanged.
# Test with:
# python -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_19_candidate019_afternoon_weak_trend_block.yaml
#
# Cycle-19 bounded hypothesis: the fresh 48-candidate sweep selected
# candidate_019 as the best sample-eligible configuration. It improved
# production drawdown, total return, and trade count, but still failed all
# return/profit gates. In that candidate, afternoon trend long_1x and short_2x
# exits were a concentrated loss cluster. Keep the rank-1 sweep parameters and
# add one new behavior: block those weak afternoon trend entries.
model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.30

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "block_afternoon_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["afternoon"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.20
      short_2x: 0.50
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true

backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.00
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.20
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_19_candidate019_afternoon_weak_trend_block"
