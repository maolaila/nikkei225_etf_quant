# Candidate overlay only. Production YAML remains historical/paper-mode.
# Run with:
# & $env:QUANT_PYTHON_EXE -m src.main backtest --model latest --config-overrides config/experiments/iteration_9_candidate003_stable_band_margin.yaml
#
# Iteration-9 bounded hypothesis:
# The required 48-candidate stable-band sweep ranked candidate_003 first.
# It preserved real J-Quants data, 12 walk-forward windows, no fallback split,
# and passed the negative stable-band gate with total_return_pct=-13.2198,
# direction_month_ratio=0.8462, total_trades=52, and max_drawdown_pct=-13.2520.
# Compared with the current main baseline, it adds more margin inside the
# accepted negative signed band by using a stricter action-probability gate,
# longer but bounded holds, opposite-signal exits, larger inverse exposure,
# and more conservative execution assumptions.

model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.35

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: false
      actions: ["short_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: false
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 45
    stop_loss_pct:
      long_1x: 0.80
      long_2x: 2.20
      short_1x: 1.80
      short_2x: 1.50
    dynamic_holding:
      confidence_extend_multiplier: 1.50
      max_minutes: 180
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.20
      low_confidence_tighten_multiplier: 0.90
    exit_on_neutral_signal: false
    exit_on_opposite_signal: true

backtest:
  report:
    output_dir: "data/reports/experiments/iteration_9_candidate003_stable_band_margin"
  position_limits:
    long_1x:
      max_equity_pct: 75
      absolute_max_equity_pct: 80
    long_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 60
    short_1x:
      max_equity_pct: 50
      absolute_max_equity_pct: 60
    short_2x:
      max_equity_pct: 80
      absolute_max_equity_pct: 100
  position_sizing:
    min_multiplier: 1.10
    max_multiplier: 1.25
    trend_multiplier: 1.20
    range_multiplier: 0.90
    unknown_regime_multiplier: 1.00
    leveraged_etf_multiplier: 1.40
  risk:
    max_trades_per_day: 12
    max_daily_loss_pct: 10.0
    max_consecutive_losses: 20
    max_implied_dispersion_bps: 150
    realized_loss_gate:
      enabled: false
  execution:
    latency_bars: 2
    slippage_bps: 5
    fallback_spread_bps: 8
