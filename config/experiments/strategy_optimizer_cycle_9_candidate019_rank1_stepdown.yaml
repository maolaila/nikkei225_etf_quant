# Candidate overlay only. Production YAML remains unchanged.
# Fresh cycle-9 sweep rank 1 was batch_search_20260517_004253/candidate_019.
# This copies those settings into config/experiments so they can be retested with:
# python -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_9_candidate019_rank1_stepdown.yaml
model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.30

strategy:
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.20
      short_2x: 0.50
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true

backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.0
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.2
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_9_candidate019_rank1_stepdown"
