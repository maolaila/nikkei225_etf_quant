# Candidate overlay only. Production YAML remains unchanged.
# Test with:
# & $env:QUANT_PYTHON_EXE -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_38_candidate019_block_long1x.yaml
#
# Cycle-38 bounded hypothesis: the required fresh 48-candidate sweep ranked
# candidate_019 first but it still failed the 3% monthly-return gates. Its
# largest clean no-edge slice was long_1x / 1321: 26 exits, 0 wins, and about
# -7.35k JPY. Keep candidate_019 prediction gates, exits, costs, sizing, and
# risk controls unchanged; add only a long_1x entry block while preserving the
# base short_1x and morning weak-action filters.
model:
  prediction:
    min_confidence: 0.3
    min_action_probability: 0.3
strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "cycle_38_block_long1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.2
      short_2x: 0.5
    dynamic_holding:
      confidence_extend_multiplier: 1.2
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true
backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.0
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.2
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_38_candidate019_block_long1x"
