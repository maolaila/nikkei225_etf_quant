# Candidate overlay only. Production YAML remains unchanged.
# Cycle-33 bounded hypothesis: cycle 32 is the strongest cumulative candidate,
# but all residual trades clamped at the 2% minimum equity floor are range-regime
# morning short_2x entries and remain net negative. Keep the cycle-32 filters,
# prediction gates, exits, exposure caps, costs, and risk controls unchanged,
# and lower only the experiment sizing floor from 2% to 1% so existing stepdown
# rules can reduce those weak slices without reducing trade count.
strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "cycle_22_block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "cycle_20_block_late_afternoon_entries"
      enabled: true
      actions: ["long_1x", "long_2x", "short_2x"]
      start_time: "14:00"
      end_time: "15:29"
    - name: "cycle_21_block_opening_hour_entries"
      enabled: true
      actions: ["long_1x", "long_2x", "short_2x"]
      start_time: "09:00"
      end_time: "09:59"
    - name: "cycle_23_block_lunch_hour_2x_entries"
      enabled: true
      actions: ["long_2x", "short_2x"]
      start_time: "12:00"
      end_time: "12:59"
    - name: "cycle_24_block_midmorning_2x_entries"
      enabled: true
      actions: ["long_2x", "short_2x"]
      start_time: "10:30"
      end_time: "10:59"
    - name: "cycle_25_block_open_execution_long_2x"
      enabled: true
      actions: ["long_2x"]
      time_basis: "execution"
      start_time: "09:00"
      end_time: "09:29"
    - name: "cycle_30_block_lunch_reopen_execution_range_2x"
      enabled: true
      actions: ["long_2x", "short_2x"]
      market_regimes: ["range"]
      time_basis: "execution"
      start_time: "12:30"
      end_time: "12:59"
  exit:
    max_holding_minutes: 90
    stop_loss_pct:
      long_2x: 0.8
      short_2x: 1.2
    dynamic_holding:
      confidence_extend_multiplier: 1.2
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.1
    exit_on_neutral_signal: false
    exit_on_opposite_signal: true
model:
  prediction:
    min_confidence: 0.3
    min_action_probability: 0.35
backtest:
  position_limits:
    long_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 35
    short_2x:
      max_equity_pct: 15
      absolute_max_equity_pct: 30
  position_sizing:
    min_equity_pct: 1
    max_multiplier: 1.15
    trend_multiplier: 1.3
    adjustments:
      - name: "cycle_31_late_morning_range_short2x_stepdown"
        enabled: true
        actions: ["short_2x"]
        market_regimes: ["range"]
        sessions: ["morning"]
        start_time: "11:00"
        end_time: "11:29"
        multiplier: 0.25
      - name: "cycle_32_open_execution_range_short2x_stepdown"
        enabled: true
        time_basis: "execution"
        actions: ["short_2x"]
        market_regimes: ["range"]
        sessions: ["morning"]
        start_time: "09:00"
        end_time: "09:29"
        multiplier: 0.25
  risk:
    max_trades_per_day: 3
    max_daily_loss_pct: 2.0
    max_consecutive_losses: 1
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_33_min_equity_floor_stepdown"
