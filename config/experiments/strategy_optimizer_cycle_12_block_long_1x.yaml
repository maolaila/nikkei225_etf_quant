# Candidate overlay only. Production YAML remains unchanged.
# Cycle-12 bounded hypothesis: the required 48-candidate sweep's rank-1
# candidate reduced broad losses but still carried a small long_1x sleeve that
# was loss-only in both production and the batch winner. Keep the batch winner's
# gates, exits, sizing, and risk controls, then add only a long_1x entry block.
model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.35

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 90
    stop_loss_pct:
      long_2x: 0.80
      short_2x: 1.20
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.10
    exit_on_neutral_signal: false
    exit_on_opposite_signal: true

backtest:
  position_limits:
    long_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 35
    short_2x:
      max_equity_pct: 15
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.20
  risk:
    max_trades_per_day: 3
    max_daily_loss_pct: 2.0
    max_consecutive_losses: 1
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_12_block_long_1x"
