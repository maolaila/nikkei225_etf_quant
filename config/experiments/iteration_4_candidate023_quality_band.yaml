# Candidate overlay only. Production YAML remains unchanged.
# Run with:
# & $env:QUANT_PYTHON_EXE -m src.main backtest --model latest --config-overrides config/experiments/iteration_4_candidate023_quality_band.yaml
#
# Iteration-4 bounded hypothesis:
# The required 48-candidate stable-band sweep found candidate_023 as a better
# trade-quality negative-band candidate than the current main backtest. It kept
# real J-Quants data, 12 walk-forward windows, no fallback split, and passed the
# stable-band gate with 266 trades, profit_factor=0.701, and total_return_pct=-9.09.
# This overlay reproduces that candidate profile for historical/paper testing.

model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.20

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: false
      actions: ["short_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: false
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 180
    stop_loss_pct:
      long_1x: 0.80
      long_2x: 2.20
      short_1x: 0.50
      short_2x: 0.80
    dynamic_holding:
      confidence_extend_multiplier: 1.80
      max_minutes: 240
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 2.20
      low_confidence_tighten_multiplier: 1.00
    exit_on_neutral_signal: false
    exit_on_opposite_signal: false

backtest:
  report:
    output_dir: "data/reports/experiments/iteration_4_candidate023_quality_band"
  position_limits:
    long_1x:
      max_equity_pct: 25
      absolute_max_equity_pct: 80
    long_2x:
      max_equity_pct: 75
      absolute_max_equity_pct: 45
    short_1x:
      max_equity_pct: 20
      absolute_max_equity_pct: 100
    short_2x:
      max_equity_pct: 80
      absolute_max_equity_pct: 45
  position_sizing:
    min_multiplier: 0.50
    max_multiplier: 1.25
    trend_multiplier: 1.00
    range_multiplier: 1.25
    unknown_regime_multiplier: 1.20
    leveraged_etf_multiplier: 1.00
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 2.0
    max_consecutive_losses: 20
    max_implied_dispersion_bps: 150
    realized_loss_gate:
      enabled: false
  execution:
    latency_bars: 2
    slippage_bps: 3
    fallback_spread_bps: 8
