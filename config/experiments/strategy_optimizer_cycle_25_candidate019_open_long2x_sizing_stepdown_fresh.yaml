# Candidate overlay only. Production YAML remains unchanged.
# Cycle-25 bounded hypothesis from fresh batch_search_20260517_085746:
# rank-1 candidate_019 is sample-eligible and improves production drawdown and
# trade count, but the loss review still shows residual long_2x/1570 losses
# clustered in the opening execution window. Keep the rank-1 candidate settings
# plus the prior sample-preserving long_1x and post-lunch 2x filters, then add
# one new behavior: scale down long_2x executions before 09:30 without blocking
# the trades outright.
# Test with:
# python -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_25_candidate019_open_long2x_sizing_stepdown_fresh.yaml
strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "cycle_25_block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "cycle_25_block_post_lunch_2x_entries"
      enabled: true
      actions: ["long_2x", "short_2x"]
      start_time: "13:00"
      end_time: "13:29"
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.2
      short_2x: 0.5
    dynamic_holding:
      confidence_extend_multiplier: 1.2
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true
model:
  prediction:
    min_confidence: 0.3
    min_action_probability: 0.3
backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.0
    adjustments:
      - name: "cycle_25_open_execution_long2x_sizing_stepdown"
        enabled: true
        actions: ["long_2x"]
        sessions: ["morning"]
        start_time: "09:00"
        end_time: "09:29"
        time_basis: "execution"
        multiplier: 0.60
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.2
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_25_candidate019_open_long2x_sizing_stepdown_fresh"
