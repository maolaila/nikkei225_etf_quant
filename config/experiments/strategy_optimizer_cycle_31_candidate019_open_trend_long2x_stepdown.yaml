# Candidate overlay only. Production YAML remains unchanged.
# Test with:
# python -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_31_candidate019_open_trend_long2x_stepdown.yaml
#
# Cycle-31 bounded hypothesis: the required 48-candidate sweep again ranked
# candidate_019 first because it preserved sample size and reduced drawdown, but
# the remaining loss-only attribution was dominated by 09:00 trend long_2x/1570
# exits. Keep candidate_019 and the prior afternoon weak-action block, then add
# only an execution-time sizing stepdown for opening trend long_2x entries.
model:
  prediction:
    min_confidence: 0.3
    min_action_probability: 0.3
strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "cycle_30_block_afternoon_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["afternoon"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.2
      short_2x: 0.5
    dynamic_holding:
      confidence_extend_multiplier: 1.2
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true
backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.0
    adjustments:
      - name: "cycle_31_open_trend_long2x_stepdown"
        enabled: true
        time_basis: "execution"
        actions: ["long_2x"]
        sessions: ["morning"]
        market_regimes: ["trend"]
        start_time: "09:00"
        end_time: "09:29"
        multiplier: 0.50
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.2
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_31_candidate019_open_trend_long2x_stepdown"
