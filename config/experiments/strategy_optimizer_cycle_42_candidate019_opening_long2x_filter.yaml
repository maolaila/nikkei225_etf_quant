# Cycle 42 test-only overlay.
# Run with:
# & $env:QUANT_PYTHON_EXE -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_42_candidate019_opening_long2x_filter.yaml
#
# Hypothesis: candidate_019 improved drawdown and trade count, but both the
# production run and candidate_019 still lose heavily on opening trend long_2x
# trades. Block only 09:05-09:30 morning trend long_2x entries while preserving
# the existing production entry filters.

model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.30

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
    - name: "cycle_42_block_opening_trend_long_2x"
      enabled: true
      actions: ["long_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
      start_time: "09:05"
      end_time: "09:30"
      time_basis: "signal"
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.20
      short_2x: 0.50
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true

backtest:
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_42_candidate019_opening_long2x_filter"
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.00
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.20
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
