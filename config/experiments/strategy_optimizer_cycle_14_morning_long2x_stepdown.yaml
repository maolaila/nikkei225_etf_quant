# Candidate overlay only. Production YAML remains unchanged.
# Fresh cycle-14 sweep rank 1 was batch_search_20260517_023138/candidate_019.
# Bounded hypothesis: keep the rank-1 gates/exits/risk/execution settings plus
# the prior all-regime long_1x and short_2x blocks, then reduce only the two
# worst surviving long_2x morning-trend exposure windows. This preserves sample
# count while testing whether residual losses are mainly oversized 1570 entries.
#
# Test with:
# python -m src.main backtest --model latest --config-overrides config/experiments/strategy_optimizer_cycle_14_morning_long2x_stepdown.yaml
model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.30

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "cycle_14_block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "cycle_14_block_short_2x_all_regimes"
      enabled: true
      actions: ["short_2x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.20
      short_2x: 0.50
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true

backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.00
    adjustments:
      - name: "cycle_14_open_trend_long_2x_stepdown"
        enabled: true
        actions: ["long_2x"]
        sessions: ["morning"]
        market_regimes: ["trend"]
        start_time: "09:00"
        end_time: "09:29"
        time_basis: "both"
        multiplier: 0.60
      - name: "cycle_14_late_morning_trend_long_2x_stepdown"
        enabled: true
        actions: ["long_2x"]
        sessions: ["morning"]
        market_regimes: ["trend"]
        start_time: "10:30"
        end_time: "10:59"
        time_basis: "both"
        multiplier: 0.60
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.20
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_14_morning_long2x_stepdown"
