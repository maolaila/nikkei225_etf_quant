# Candidate overlay only. Production YAML remains unchanged.
# Cycle-16 bounded hypothesis: the fresh 48-candidate sweep again ranked
# candidate_019 highest, but it still loses money. The strongest tested prior
# overlay blocked the unprofitable long_1x leg and kept enough trades for the
# sample gate; its residual losses concentrated in morning trend long_2x/1570
# neutral-signal exits. Keep those gates/exits/risk/costs and add only one new
# cycle-16 behavior change: reduce morning trend long_2x sizing rather than
# removing the trades from the sample.
model:
  prediction:
    min_confidence: 0.30
    min_action_probability: 0.30

strategy:
  entry_filters:
    - name: "block_short_1x_all_regimes"
      enabled: true
      actions: ["short_1x"]
    - name: "block_long_1x_all_regimes"
      enabled: true
      actions: ["long_1x"]
    - name: "block_morning_trend_weak_actions"
      enabled: true
      actions: ["long_1x", "short_2x"]
      sessions: ["morning"]
      market_regimes: ["trend"]
  exit:
    max_holding_minutes: 30
    stop_loss_pct:
      long_2x: 1.20
      short_2x: 0.50
    dynamic_holding:
      confidence_extend_multiplier: 1.20
      max_minutes: 150
    dynamic_stop_loss:
      high_confidence_widen_multiplier: 1.25
    exit_on_neutral_signal: true
    exit_on_opposite_signal: true

backtest:
  position_limits:
    long_2x:
      max_equity_pct: 35
      absolute_max_equity_pct: 50
    short_2x:
      max_equity_pct: 25
      absolute_max_equity_pct: 30
  position_sizing:
    max_multiplier: 1.15
    trend_multiplier: 1.00
    adjustments:
      - name: "throttle_morning_trend_long_2x"
        enabled: true
        actions: ["long_2x"]
        sessions: ["morning"]
        market_regimes: ["trend"]
        start_time: "09:00"
        end_time: "10:59"
        multiplier: 0.70
  risk:
    max_trades_per_day: 4
    max_daily_loss_pct: 1.20
    max_consecutive_losses: 1
    max_implied_dispersion_bps: 75
  execution:
    latency_bars: 1
    slippage_bps: 5
    fallback_spread_bps: 5
  report:
    output_dir: "data/reports/experiments/strategy_optimizer_cycle_16_morning_trend_long2x_sizing_stepdown"
